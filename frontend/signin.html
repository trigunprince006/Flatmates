<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign In - FlatMate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Plus+Jakarta+Sans:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .hero-blur {
        filter: blur(8px);
        transform: scale(1.05);
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              surface: "#f8f9ff",
              "primary-container": "#008378",
              "on-tertiary-fixed-variant": "#3d4947",
              "surface-container-high": "#dce9ff",
              "primary-fixed": "#89f5e7",
              primary: "#00685f",
              "surface-bright": "#f8f9ff",
              "secondary-container": "#dae2fd",
              "on-tertiary": "#ffffff",
              "primary-fixed-dim": "#6bd8cb",
              "secondary-fixed": "#dae2fd",
              "on-background": "#0b1c30",
              "on-tertiary-fixed": "#121e1c",
              "surface-dim": "#cbdbf5",
              "outline-variant": "#bcc9c6",
              background: "#f8f9ff",
              "on-primary-fixed-variant": "#005049",
              "on-secondary-container": "#5c647a",
              "inverse-on-surface": "#eaf1ff",
              "surface-container-lowest": "#ffffff",
              "on-primary-container": "#f4fffc",
              "inverse-primary": "#6bd8cb",
              "on-secondary-fixed-variant": "#3f465c",
              "on-error-container": "#93000a",
              "on-secondary-fixed": "#131b2e",
              "surface-variant": "#d3e4fe",
              secondary: "#565e74",
              "on-tertiary-container": "#f3fffc",
              error: "#ba1a1a",
              "surface-container-low": "#eff4ff",
              "on-surface-variant": "#3d4947",
              "surface-tint": "#006a61",
              "error-container": "#ffdad6",
              "on-secondary": "#ffffff",
              "tertiary-container": "#6b7775",
              "on-surface": "#0b1c30",
              "on-error": "#ffffff",
              outline: "#6d7a77",
              "secondary-fixed-dim": "#bec6e0",
              "on-primary": "#ffffff",
              tertiary: "#525e5c",
              "inverse-surface": "#213145",
              "on-primary-fixed": "#00201d",
              "tertiary-fixed": "#d8e5e2",
              "surface-container-highest": "#d3e4fe",
              "surface-container": "#e5eeff",
              "tertiary-fixed-dim": "#bcc9c6",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "margin-mobile": "16px",
              lg: "2.5rem",
              xs: "0.5rem",
              xl: "4rem",
              "max-width": "1280px",
              gutter: "24px",
              base: "4px",
              "margin-desktop": "80px",
              md: "1.5rem",
              sm: "1rem",
            },
            fontFamily: {
              "headline-md": ["Plus Jakarta Sans"],
              "headline-lg": ["Plus Jakarta Sans"],
              "display-lg": ["Plus Jakarta Sans"],
              "body-sm": ["Inter"],
              "label-sm": ["Inter"],
              "display-md": ["Plus Jakarta Sans"],
              "body-lg": ["Inter"],
              "body-md": ["Inter"],
              "label-md": ["Inter"],
            },
            fontSize: {
              "headline-md": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
              "headline-lg": ["30px", { lineHeight: "1.3", fontWeight: "600" }],
              "display-lg": [
                "48px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
              "label-sm": ["12px", { lineHeight: "1", fontWeight: "500" }],
              "display-md": [
                "36px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
              "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
              "label-md": [
                "14px",
                { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" },
              ],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-surface font-body-md text-on-surface antialiased overflow-hidden"
  >
    <!-- Background Layer with Blur -->
    <div class="fixed inset-0 z-0">
      <div class="absolute inset-0 bg-black/10 z-10"></div>
      <img
        class="w-full h-full object-cover hero-blur"
        data-alt="A sun-drenched, high-end modern living room with floor-to-ceiling windows overlooking a lush urban garden. The interior features soft beige textiles, warm oak wood flooring, and minimalist Scandinavian furniture. The lighting is ethereal and soft, creating a tranquil and inviting atmosphere for a luxury flatmate finding platform. The overall aesthetic is clean, sophisticated, and radiates a sense of trust and home comfort."
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuANq9AhpYKyurau1M572jfO4-31TUvGwO4fI2A-YmNIoiBzcID76fYuc3RnxT1gIsuWJ5PodGyi1fe2D5zxmqSjCBUc-Q6kkhXM3yzZuLzcJPtFNwQf4VFUKiNkAyLgk-skqLKX9Ha-j5ChWTQ6b-aLhnOpKmajLAAh0XzHBeqYY97GHYx-uT0yCHJvl6qDfZjgvMWjJOGIQfGAE_M2PHd_Vw3iCzil41cVzZESs-AAV-1cyjyuoR9xQYLiN5Vu42xa0rpiBEpO8KqB"
      />
    </div>
    <!-- Login Container -->
    <main
      class="relative z-20 min-h-screen flex items-center justify-center p-margin-mobile md:p-0"
    >
      <div
        class="w-full max-w-[440px] glass-effect rounded-[32px] p-md md:p-lg shadow-2xl animate-in fade-in zoom-in duration-700"
      >
        <!-- Brand Logo -->
        <div class="flex flex-col items-center mb-md">
          <div
            class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-sm shadow-lg shadow-primary/20"
          >
            <span
              class="material-symbols-outlined text-white text-3xl"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >home_pin</span
            >
          </div>
          <h1 class="font-headline-lg text-headline-lg text-primary">
            FlatMate
          </h1>
          <p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">
            Find your perfect home match.
          </p>
        </div>
        <!-- Login Form -->
        <form class="space-y-md" onsubmit="event.preventDefault()">
          <!-- Email Field -->
          <div class="space-y-xs">
            <label
              class="font-label-md text-label-md text-on-surface ml-1"
              for="email"
              >Email Address</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]"
                >mail</span
              >
              <input
                class="w-full h-[52px] pl-12 pr-4 bg-white/50 border border-outline-variant/50 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md outline-none"
                id="email"
                name="email"
                placeholder="name@example.com"
                type="email"
              />
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-xs">
            <label
              class="font-label-md text-label-md text-on-surface ml-1"
              for="password"
              >Password</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]"
                >lock</span
              >
              <input
                class="w-full h-[52px] pl-12 pr-12 bg-white/50 border border-outline-variant/50 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md outline-none"
                id="password"
                name="password"
                placeholder="••••••••"
                type="password"
              />
              <button
                class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors"
                type="button"
              >
                <span class="material-symbols-outlined text-[20px]"
                  >visibility</span
                >
              </button>
            </div>
          </div>
          <!-- Options Row -->
          <div
            class="flex items-center justify-between font-label-md text-label-md"
          >
            <label class="flex items-center gap-2 cursor-pointer group">
              <div class="relative flex items-center">
                <input
                  class="peer h-5 w-5 rounded border-outline-variant text-primary focus:ring-primary transition-all cursor-pointer"
                  type="checkbox"
                />
              </div>
              <span
                class="text-on-surface-variant group-hover:text-on-surface transition-colors"
                >Remember me</span
              >
            </label>
            <a class="text-primary font-semibold hover:underline" href="#"
              >Forgot Password?</a
            >
          </div>
          <!-- CTA Button -->
          <button
            class="w-full h-[52px] bg-primary text-white rounded-full font-headline-md text-headline-md shadow-lg shadow-primary/25 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
            type="submit"
          >
            Sign In
            <span class="material-symbols-outlined text-[20px]"
              >arrow_forward</span
            >
          </button>
        </form>
        <!-- Divider -->
        <div class="relative my-lg">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-outline-variant/30"></div>
          </div>
          <div
            class="relative flex justify-center text-label-sm uppercase tracking-widest"
          >
            <span class="px-4 glass-effect text-on-surface-variant"
              >Or continue with</span
            >
          </div>
        </div>
        <!-- Social Logins -->
        <div class="grid grid-cols-2 gap-sm">
          <button
            class="flex items-center justify-center gap-2 h-[48px] bg-white border border-outline-variant/50 rounded-xl hover:bg-surface-container-low transition-colors shadow-sm font-label-md text-label-md"
          >
            <img
              alt="Google"
              class="w-5 h-5"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3ZpueeQovVUut2NjmHGDdyyCCA8tmZzwe6LfAYS4lzrqo_J9AehyaJ9qtzA1wAigR5oit-SAcs6MJaHvd_4z_RdIvSxfCBqxyjMv6U_l4W0RoS5io_TFk5TQ0RbcNUQCPtvMmnr8XvGfn8_mMuGrmO1iq3F4BHStjI3im6KKA_Tc53iM9oBowSnWmKZ7gmhTO-gsSNMG8x7BHkMwSSlsMlZhwAvqHyaFYb5ZZ_SCVV1ZO2x_dUUHf8DyZfF1EhUhaBsF6C5ScLngW"
            />
            Google
          </button>
          <button
            class="flex items-center justify-center gap-2 h-[48px] bg-[#1877F2] text-white rounded-xl hover:opacity-90 transition-opacity shadow-sm font-label-md text-label-md"
          >
            <svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
              <path
                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"
              ></path>
            </svg>
            Facebook
          </button>
        </div>
        <!-- Sign Up Link -->
        <p
          class="text-center mt-lg font-body-sm text-body-sm text-on-surface-variant"
        >
          Don't have an account?
          <a class="text-primary font-bold hover:underline" href="register.html"
            >Create an account</a
          >
        </p>
      </div>
    </main>
    <!-- Simple Footer (Non-distracting) -->
    <footer class="fixed bottom-0 w-full p-md text-center z-20">
      <p class="font-label-sm text-label-sm text-black/70 drop-shadow-md">
        © 2024 FlatMate Inc. All rights reserved.
      </p>
    </footer>
    <script>
      // Subtle micro-interactions
      document.querySelectorAll("input").forEach((input) => {
        input.addEventListener("focus", () => {
          input.parentElement.parentElement
            .querySelector("label")
            ?.classList.add("text-primary");
        });
        input.addEventListener("blur", () => {
          input.parentElement.parentElement
            .querySelector("label")
            ?.classList.remove("text-primary");
        });
      });

      // Form submission animation mock
      const form = document.querySelector("form");
      form.addEventListener("submit", (e) => {
        const btn = form.querySelector('button[type="submit"]');
        const originalContent = btn.innerHTML;
        btn.innerHTML =
          '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
        btn.disabled = true;

        setTimeout(() => {
          btn.innerHTML = originalContent;
          btn.disabled = false;
        }, 1500);
      });
    </script>
  </body>
</html>
